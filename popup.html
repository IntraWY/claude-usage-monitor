<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Claude Usage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    /* === Dark theme (default) === */
    body {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      padding: 14px 20px 12px;
      transition: background .2s, color .2s;
    }

    #status { opacity: .5; font-size: 13px; text-align: center; padding: 12px 0; }

    .row { margin-bottom: 16px; }
    .row-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .label { opacity: .55; font-size: 12px; }
    .pct { font-weight: 700; font-size: 20px; }

    .track {
      height: 6px;
      background: rgba(255,255,255,.12);
      border-radius: 3px;
      transition: background .2s;
    }
    .fill { height: 100%; border-radius: 3px; transition: width .3s ease; }

    .reset-time { opacity: .38; font-size: 11px; text-align: right; margin-top: 3px; }

    #toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    #toolbar span { opacity: .3; font-size: 11px; letter-spacing: .5px; }

    #theme-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
      transition: background .15s;
    }
    #theme-btn:hover { background: rgba(255,255,255,.1); }

    #refresh {
      display: block;
      width: 100%;
      margin-top: 4px;
      padding: 7px;
      background: rgba(255,255,255,.07);
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,.5);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, color .2s;
    }
    #refresh:hover { background: rgba(255,255,255,.13); }

    /* === Light theme === */
    body.light {
      background: #f7f7f8;
      color: #111;
    }
    body.light .track { background: rgba(0,0,0,.1); }
    body.light #theme-btn:hover { background: rgba(0,0,0,.07); }
    body.light #refresh {
      background: rgba(0,0,0,.06);
      color: rgba(0,0,0,.45);
    }
    body.light #refresh:hover { background: rgba(0,0,0,.1); }
    body.light #toolbar span { opacity: .25; }
    body.light .label { opacity: .5; }
    body.light .reset-time { opacity: .35; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>CLAUDE USAGE</span>
    <button id="theme-btn" title="สลับธีม">🌙</button>
  </div>
  <div id="content"><div id="status">กำลังโหลด...</div></div>
  <button id="refresh">⟳ รีเฟรช</button>
  <script src="popup.js"></script>
</body>
</html>
